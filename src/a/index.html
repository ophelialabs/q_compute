<script src="./assets/js/app.js"></script>
    <script>
        // Page configuration
        // Organize by Navigation/Directories
        const PAGES = {
                'home': 'pages/home.html',
                'pipeline': 'pages/enterprise/pages/pipeline/index.html',
                'pipeline2': 'pages/learn/pipeline/index2.html',
                'rnr': 'pages/learn/resources.html',
                'hdf5': 'pages/enterprise/pages/data/hdf5.html',
                'data': 'pages/enterprise/pages/data/data.html',
                'datalakehouse': 'pages/enterprise/pages/data/bigdata/datalakehouse.html',
                'bigdatalinks': 'pages/enterprise/pages/sdata/bigdata/links.html',
                'tools-list': 'pages/learn/tools-list.html',
                'bmi': 'content/public/BMI/README.md',
                'mat-cs': 'pages/learn/resources/mat-cs/mat-cs.md',
                'dashboard': 'pages/quantum/content/admin/dashboard.html',
                'users-list': 'pages/users/users-list.html',
                'settings': 'pages/quantum/content/admin/settings.html',
                'architecture': 'pages/enterprise/pages/architecture/arch.md',
                'publications': 'pages/learn/resources/publications.html',
                'geofence': 'pages/enterprise/pages/geo/index.md',
                'journals': 'pages/learn/resources/journals.html',
                'universities': 'pages/learn/resources/universities.html',
                'python': 'pages/learn/python.html',

                // New page entries
                'physics-passive': 'pages/learn/Departments/Physics/passive/README.md',
                'optical': 'pages/quantum/content/infrastructure/qnet/Q_Control/optical.md',
                'q-control': 'pages/quantum/content/infrastructure/qnet/Q_Control/README_formatted.md',

                // RN directory
                'Implant': 'RN/Implant/Index.md',
                'Implant-Index2': 'RN/Implant/index2.md',
                'Implant-Index3': 'RN/Implant/index3.md',
                'Informatics': 'RN/Informatics/Index.md',
                'Informatics-Index2': 'RN/Informatics/index2.md',
                'Informatics-Index3': 'RN/Informatics/index3.md',
                'Curtain': 'RN/Curtain/Index.md',
                'Curtain-Index2': 'RN/Curtain/index2.md',
                'Curtain-Index3': 'RN/Curtain/index3.md',
                'Comm': 'RN/Comm/Index.md',
                'Comm-Index2': 'RN/Comm/index2.md',
                'Comm-Index3': 'RN/Comm/index3.md'
        };

        const loadedPages = new Set();

        // Load navbar and sidebar
        Promise.all([
            fetch('assets/layout/navbar.html').then(r => r.text()),
            fetch('assets/layout/sidebar.html').then(r => r.text())
        ]).then(([navbar, sidebar]) => {
            document.getElementById('navbar').innerHTML = navbar;
            document.getElementById('sidebar').innerHTML = sidebar;
            initNavbar();
            initSidebar();
        }).catch(error => console.error('Error loading layout:', error));

        function loadPageContent(pageId) {
            if (!PAGES.hasOwnProperty(pageId)) {
                console.warn('Page not found:', pageId);
                return Promise.reject('Page not found');
            }

            const pageElement = document.getElementById(pageId);
            if (!pageElement) {
                console.warn('Page element not found:', pageId);
                return Promise.reject('Element not found');
            }

            const filePath = PAGES[pageId];
            const isMarkdown = filePath.endsWith('.md');

            return fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.text();
                })
                .then(content => {
                    if (isMarkdown) {
                        // Convert markdown to HTML
                        const html = marked.parse(content);
                        pageElement.innerHTML = `<div class="content-section">${html}</div>`;
                    } else {
                        pageElement.innerHTML = content;
                    }
                    loadedPages.add(pageId);
                    
                    // Render Mermaid diagrams after content is loaded
                    if (window.mermaid) {
                        setTimeout(() => {
                            try {
                                mermaid.run();
                            } catch (err) {
                                console.warn('Error rendering mermaid diagrams:', err);
                            }
                        }, 100);
                    }
                })
                .catch(error => {
                    console.error(`Error loading page ${pageId}:`, error);
                    pageElement.innerHTML = `<div class="content-section"><h1>Error Loading Page</h1><p>Could not load content: ${error}</p></div>`;
                });
        }

        function navigateToPage(hash) {
            const pageId = (hash.substring(1) || 'home').toLowerCase();
            
            if (!PAGES.hasOwnProperty(pageId)) {
                console.warn('Invalid page ID:', pageId);
                return;
            }

            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });

            // Show and load target page
            const targetPage = document.getElementById(pageId);
            if (targetPage) {
                targetPage.classList.add('active');
                
                // Load content if not already loaded
                if (!loadedPages.has(pageId)) {
                    loadPageContent(pageId);
                } else {
                    // Already loaded, just render mermaid if needed
                    if (window.mermaid) {
                        setTimeout(() => {
                            try {
                                mermaid.run();
                            } catch (err) {
                                console.warn('Error rendering mermaid:', err);
                            }
                        }, 100);
                    }
                }
            }
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            // Load initial page
            navigateToPage(window.location.hash);
            
            // Handle hash changes
            window.addEventListener('hashchange', () => {
                navigateToPage(window.location.hash);
            });
        });
    </script>
</body>
